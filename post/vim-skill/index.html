<h3 id="启动命令">启动命令</h3>
<ul>
<li>ZQ 无条件退出</li>
<li>ZZ 存盘并退出</li>
<li>临时退出 Vi/Vim<br>
Ctrl-z 退出<br>
fg 重新进入</li>
</ul>
<h3 id="移动光标">移动光标</h3>
<ul>
<li>w 向后移动一个单词</li>
<li>b 向前移动一个单词</li>
<li>e 移动到单词的末尾</li>
<li>0 移至行首</li>
<li>$ 移至行尾</li>
<li>{ 向上移动一个段落</li>
<li>} 向下移动一个段落</li>
</ul>
